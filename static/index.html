<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="chat-history-section">
                    <div class="chat-history" id="chatHistory">
                        <!-- Chat history items will be added here -->
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <button class="sidebar-btn" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="sidebar-btn" id="settingsBtn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-container">
            <!-- Chat Header -->
            <header class="chat-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Claude AI</h1>
                <div class="header-spacer"></div>
            </header>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chatBox">
                <div class="welcome-container">
                    <div class="welcome-greeting">
                        <div class="sparkle-icon">✨</div>
                        <h2 id="greetingText">How can I help you today?</h2>
                    </div>
                    
                    <div class="suggested-prompts">
                        <button class="prompt-btn" onclick="insertSuggestedPrompt('Explain quantum computing in simple terms')">
                            <div class="prompt-icon">
                                <i class="fas fa-lightbulb"></i>
                            </div>
                            <div class="prompt-text">
                                <span class="prompt-title">Explain something</span>
                                <span class="prompt-subtitle">Explain quantum computing</span>
                            </div>
                        </button>
                        <button class="prompt-btn" onclick="insertSuggestedPrompt('Write a Python function for sorting')">
                            <div class="prompt-icon">
                                <i class="fas fa-code"></i>
                            </div>
                            <div class="prompt-text">
                                <span class="prompt-title">Write code</span>
                                <span class="prompt-subtitle">Create a Python function</span>
                            </div>
                        </button>
                        <button class="prompt-btn" onclick="insertSuggestedPrompt('Tell me an interesting fact')">
                            <div class="prompt-icon">
                                <i class="fas fa-star"></i>
                            </div>
                            <div class="prompt-text">
                                <span class="prompt-title">Get inspired</span>
                                <span class="prompt-subtitle">Tell me something interesting</span>
                            </div>
                        </button>
                        <button class="prompt-btn" onclick="insertSuggestedPrompt('Plan a weekend trip')">
                            <div class="prompt-icon">
                                <i class="fas fa-map"></i>
                            </div>
                            <div class="prompt-text">
                                <span class="prompt-title">Plan something</span>
                                <span class="prompt-subtitle">Create a weekend itinerary</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Input Area -->
            <div class="chat-input-container">
                <form class="input-form" id="messageForm">
                    <div class="input-wrapper">
                        <button type="button" class="action-btn plus-btn" title="Add file">
                            <i class="fas fa-plus"></i>
                        </button>
                        <input 
                            type="text" 
                            id="userInput" 
                            class="message-input"
                            placeholder="Message ChatBot"
                            autocomplete="off"
                        >
                        <div class="input-actions">
                            <button type="button" class="action-btn" id="voiceBtn" title="Voice input">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button type="submit" class="send-btn" id="sendBtn" title="Send message">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>Theme</label>
                    <select id="themeSelect">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="auto">Auto</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
